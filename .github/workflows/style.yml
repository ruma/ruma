name: Style

on:
  workflow_call:

jobs:
  tools:
    name: External Tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check spelling
        uses: crate-ci/typos@v1.45.1

      - name: Install cargo-sort, cargo-machete and rumdl
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort@2.1.3,cargo-machete@0.9.2,rumdl@0.1.81

      - name: Run cargo-sort
        run: |
          cargo sort --workspace --grouped --check \
                      --order package,lib,features,dependencies,target,dev-dependencies,build-dependencies

      - name: Run cargo-machete
        run: cargo machete

      - name: Run rumdl
        run: rumdl check .
